<!DOCTYPE html>
<html>
<head>
    <title>My Test Shop</title>
<script>
    (function(w, d, t, u, o) {
        w[u] = w[u] || [], o.ts = (new Date).getTime();
        var n = d.createElement(t);
        n.src = "https://bat.bing.net/bat.js?ti=" + o.ti + ("uetq" != u ? "&q=" + u : ""),
        n.async = 1, n.onload = n.onreadystatechange = function() {
            var s = this.readyState;
            s && "loaded" !== s && "complete" !== s ||
            (o.q = w[u], w[u] = new UET(o), w[u].push("pageLoad"),
            n.onload = n.onreadystatechange = null)
    };
        var i = d.getElementsByTagName(t)[0];
        i.parentNode.insertBefore(n, i);
    })(window, document, "script", "uetq", {
        ti: "187259166",
        enableAutoSpaTracking: true
    });
</script>
</head>
<body>
    <h1>欢迎来到我的测试电商网站（标准自定义事件版）</h1>
    <button id="buy-btn">模拟购买商品（触发转化）</button>
    <script>
        document.getElementById("buy-btn").addEventListener("click", function() {
            window.uetq = window.uetq || [];

            // 【核心修正】放弃保留词 purchase，采用全拼标准自定义事件参数
            // 这样写可以强迫 bat.js 必须在 Payload 中暴露出 ec, ea, ev 等明文参数
            window.uetq.push('event', 'click_buy_btn', { 
                'event_category': 'checkout', 
                'event_label': 'test_product',
                'event_value': 5000 
            });

            // 打印在控制台
            console.log("=== 微软技术支持标准测试 ===");
            console.log("成功触发标准自定义事件！已向微软上报数据：Category=checkout, Action=click_buy_btn, Value=5000");
            console.log("当前 window.uetq 队列内容为:", window.uetq);
        });
    </script>
</body>
</html>
